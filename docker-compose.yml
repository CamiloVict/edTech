# Postgres local alineado con apps/api/.env.example
# Uso: docker compose up -d
# Luego: pnpm --filter @repo/database exec prisma migrate deploy

services:
  postgres:
    image: postgres:16-alpine
    container_name: trofoschool-postgres
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trofoschool
    volumes:
      - trofo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d trofoschool']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  trofo_pg_data:

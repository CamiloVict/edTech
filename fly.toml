# fly.toml app configuration file generated for trofo-school-api on 2026-04-11T22:58:06-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trofo-school-api'
primary_region = 'iad'

[build]
  dockerfile = 'apps/api/Dockerfile'

[deploy]
  release_command = 'pnpm --filter @repo/database exec prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/v1/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
